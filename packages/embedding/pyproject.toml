[project]
name = "embedding"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = ["lmstudio>=1.0.0"]

[project.scripts]
embed-text = "embedding.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/embedding"]

[tool.hatch.build.targets.sdist]
include = ["src/embedding"]
