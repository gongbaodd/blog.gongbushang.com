[package]
name = "umap"
version = "0.0.1"
edition = "2021"

[lib]
name = "umap"
path = "src/lib.rs"

[[bin]]
name = "umap"
path = "src/main.rs"

[dependencies]
rag-umap = { path = "../rag-umap" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
