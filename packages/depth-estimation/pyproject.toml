[project]
name = "depth-estimation"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "huggingface-hub>=0.26.0",
    "numpy>=2.0.0",
    "onnxruntime>=1.20.0",
    "Pillow>=11.0.0",
]

[project.scripts]
depth-photo = "depth_estimation.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/depth_estimation"]

[tool.hatch.build.targets.sdist]
include = ["src/depth_estimation"]
